<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundo 3D Procedural com DIVs</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87c9ff;
      font-family: Arial, sans-serif;
      user-select: none;
    }

    #game {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        linear-gradient(to bottom, #87c9ff 0%, #b9e3ff 45%, #d6f0ff 46%, #b5d48c 100%);
      cursor: crosshair;
    }

    #world {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .poly {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      pointer-events: none;
      will-change: transform, clip-path, opacity;
    }

    #hud {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 1000;
      color: white;
      background: rgba(0, 0, 0, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 12px 14px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      line-height: 1.5;
      font-size: 14px;
      pointer-events: auto;
    }

    #centerDot {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      margin-left: -4px;
      margin-top: -4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 10px rgba(255,255,255,0.7);
      z-index: 900;
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 15, 30, 0.35);
      color: white;
      text-align: center;
      padding: 24px;
      pointer-events: auto;
    }

    #overlay .box {
      max-width: 720px;
      padding: 28px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }

    #overlay h1 {
      margin-bottom: 12px;
      font-size: 2rem;
    }

    #overlay p {
      margin: 8px 0;
      color: #eaf6ff;
    }

    #overlay button {
      margin-top: 16px;
      border: none;
      background: #ffffff;
      color: #111;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      position: relative;
      z-index: 1200;
    }

    #overlay button:hover {
      background: #e8f3ff;
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="world"></div>
    <div id="centerDot"></div>

    <div id="hud">
      <div><strong>Mundo 3D Procedural</strong></div>
      <div>WASD = mover</div>
      <div>Space = pular</div>
      <div>Mouse = olhar</div>
      <div id="coords">Pos: 0, 0, 0</div>
      <div id="stats">Polígonos: 0</div>
    </div>

    <div id="overlay">
      <div class="box">
        <h1>Exploração 3D com DIVs</h1>
        <p>Clique para capturar o mouse e começar.</p>
        <p>Use <strong>W, A, S, D</strong> para andar, <strong>Space</strong> para pular e o <strong>mouse</strong> para mover a câmera.</p>
        <p>O mundo é procedural e se estende em todas as direções.</p>
        <button id="startBtn">Entrar no Mundo</button>
      </div>
    </div>
  </div>

  <script>
    const game = document.getElementById("game");
    const world = document.getElementById("world");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const coordsEl = document.getElementById("coords");
    const statsEl = document.getElementById("stats");

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    const CX = () => W() / 2;
    const CY = () => H() / 2;

    const keys = {};
    const polygons = [];

    const player = {
      x: 0,
      y: 5,
      z: 0,
      vy: 0,
      yaw: 0,
      pitch: -0.18,
      onGround: false
    };

    const settings = {
      gravity: 24,
      jumpForce: 9,
      moveSpeed: 10,
      mouseSensitivity: 0.0022,
      fov: 980,
      renderRadius: 18,
      tileSize: 2,
      maxPitch: 1.2
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function fract(x) {
      return x - Math.floor(x);
    }

    function hash2(x, z) {
      const s = Math.sin(x * 127.1 + z * 311.7) * 43758.5453123;
      return fract(s);
    }

    function smoothNoise(x, z) {
      const ix = Math.floor(x);
      const iz = Math.floor(z);
      const fx = x - ix;
      const fz = z - iz;

      const a = hash2(ix, iz);
      const b = hash2(ix + 1, iz);
      const c = hash2(ix, iz + 1);
      const d = hash2(ix + 1, iz + 1);

      const ux = fx * fx * (3 - 2 * fx);
      const uz = fz * fz * (3 - 2 * fz);

      return lerp(
        lerp(a, b, ux),
        lerp(c, d, ux),
        uz
      );
    }

    function fbm(x, z) {
      let value = 0;
      let amp = 1;
      let freq = 1;
      let norm = 0;

      for (let i = 0; i < 5; i++) {
        value += smoothNoise(x * freq, z * freq) * amp;
        norm += amp;
        amp *= 0.5;
        freq *= 2;
      }

      return value / norm;
    }

    function getHeight(x, z) {
      const n1 = fbm(x * 0.035, z * 0.035);
      const n2 = fbm(x * 0.012, z * 0.012);
      const hills = n1 * 10;
      const continents = n2 * 18;
      const ripple = Math.sin(x * 0.08) * Math.cos(z * 0.08) * 1.2;
      return continents + hills + ripple;
    }

    function getGroundColor(h) {
      if (h < 2) return "rgb(194, 182, 128)";
      if (h < 7) return "rgb(82, 145, 78)";
      if (h < 13) return "rgb(63, 120, 68)";
      if (h < 19) return "rgb(101, 106, 89)";
      return "rgb(220, 225, 230)";
    }

    function shadeColor(rgb, amount) {
      const match = rgb.match(/\d+/g).map(Number);
      const r = clamp(Math.floor(match[0] + amount), 0, 255);
      const g = clamp(Math.floor(match[1] + amount), 0, 255);
      const b = clamp(Math.floor(match[2] + amount), 0, 255);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function ensurePolygonPool(count) {
      while (polygons.length < count) {
        const div = document.createElement("div");
        div.className = "poly";
        world.appendChild(div);
        polygons.push(div);
      }
    }

    function projectPoint(wx, wy, wz) {
      const dx = wx - player.x;
      const dy = wy - player.y;
      const dz = wz - player.z;

      const forwardX = Math.cos(player.yaw);
      const forwardZ = Math.sin(player.yaw);
      const rightX = -Math.sin(player.yaw);
      const rightZ = Math.cos(player.yaw);

      const camX = dx * rightX + dz * rightZ;
      const camZ = dx * forwardX + dz * forwardZ;
      const camY = dy;

      const cosPitch = Math.cos(-player.pitch);
      const sinPitch = Math.sin(-player.pitch);

      const rotY = camY * cosPitch - camZ * sinPitch;
      const rotZ = camY * sinPitch + camZ * cosPitch;

      if (rotZ <= 0.1) return null;

      const scale = settings.fov / rotZ;
      const sx = CX() + camX * scale;
      const sy = CY() - rotY * scale;

      return { x: sx, y: sy, z: rotZ, scale };
    }

    function drawTriangle(el, p1, p2, p3, color, zIndex, opacity = 1) {
      const minX = Math.min(p1.x, p2.x, p3.x);
      const minY = Math.min(p1.y, p2.y, p3.y);
      const maxX = Math.max(p1.x, p2.x, p3.x);
      const maxY = Math.max(p1.y, p2.y, p3.y);

      const width = maxX - minX;
      const height = maxY - minY;

      if (width < 1 || height < 1) {
        el.style.display = "none";
        return;
      }

      const ax = ((p1.x - minX) / width) * 100;
      const ay = ((p1.y - minY) / height) * 100;
      const bx = ((p2.x - minX) / width) * 100;
      const by = ((p2.y - minY) / height) * 100;
      const cx = ((p3.x - minX) / width) * 100;
      const cy = ((p3.y - minY) / height) * 100;

      el.style.display = "block";
      el.style.left = `${minX}px`;
      el.style.top = `${minY}px`;
      el.style.width = `${width}px`;
      el.style.height = `${height}px`;
      el.style.background = color;
      el.style.opacity = opacity;
      el.style.zIndex = zIndex;
      el.style.clipPath = `polygon(${ax}% ${ay}%, ${bx}% ${by}%, ${cx}% ${cy}%)`;
    }

    function triangleArea2(a, b, c) {
      return (b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x);
    }

    function addTriangle(list, p1, p2, p3, color, depthBias = 0) {
      if (!p1 || !p2 || !p3) return;
      if (triangleArea2(p1, p2, p3) >= 0) return;

      const depth = (p1.z + p2.z + p3.z) / 3 + depthBias;
      list.push({ p1, p2, p3, color, depth });
    }

    function addBillboardTree(list, x, y, z, distSq, seed) {
      const rightX = -Math.sin(player.yaw);
      const rightZ = Math.cos(player.yaw);

      const trunkW = 0.22;
      const trunkH = 2.3 + seed * 1.6;
      const crownW = 1.2 + seed * 0.6;
      const crownH = trunkH + 2.4 + seed * 2.0;

      // Tronco sempre virado para a câmera
      const tb1 = projectPoint(x - rightX * trunkW, y, z - rightZ * trunkW);
      const tb2 = projectPoint(x + rightX * trunkW, y, z + rightZ * trunkW);
      const tt1 = projectPoint(x - rightX * trunkW, y + trunkH, z - rightZ * trunkW);
      const tt2 = projectPoint(x + rightX * trunkW, y + trunkH, z + rightZ * trunkW);

      addTriangle(list, tb1, tb2, tt2, "rgb(98, 64, 36)", -distSq * 0.0001);
      addTriangle(list, tb1, tt2, tt1, "rgb(118, 76, 42)", -distSq * 0.0001);

      // Copa em billboard
      const cb1 = projectPoint(x - rightX * crownW, y + trunkH - 0.2, z - rightZ * crownW);
      const cb2 = projectPoint(x + rightX * crownW, y + trunkH - 0.2, z + rightZ * crownW);
      const ct1 = projectPoint(x - rightX * crownW * 0.22, y + crownH, z - rightZ * crownW * 0.22);
      const ct2 = projectPoint(x + rightX * crownW * 0.22, y + crownH, z + rightZ * crownW * 0.22);

      addTriangle(list, cb1, cb2, ct2, "rgb(52, 128, 61)", -distSq * 0.00015);
      addTriangle(list, cb1, ct2, ct1, "rgb(68, 156, 74)", -distSq * 0.00015);
    }

    function render() {
      const tile = settings.tileSize;
      const radius = settings.renderRadius;

      const baseX = Math.floor(player.x / tile);
      const baseZ = Math.floor(player.z / tile);

      const tris = [];

      for (let gz = baseZ - radius; gz <= baseZ + radius; gz++) {
        for (let gx = baseX - radius; gx <= baseX + radius; gx++) {
          const x0 = gx * tile;
          const z0 = gz * tile;
          const x1 = x0 + tile;
          const z1 = z0 + tile;

          const y00 = getHeight(x0, z0);
          const y10 = getHeight(x1, z0);
          const y11 = getHeight(x1, z1);
          const y01 = getHeight(x0, z1);

          const centerX = (x0 + x1) * 0.5;
          const centerZ = (z0 + z1) * 0.5;

          const dx = centerX - player.x;
          const dz = centerZ - player.z;
          const distSq = dx * dx + dz * dz;

          const p00 = projectPoint(x0, y00, z0);
          const p10 = projectPoint(x1, y10, z0);
          const p11 = projectPoint(x1, y11, z1);
          const p01 = projectPoint(x0, y01, z1);

          if (!p00 && !p10 && !p11 && !p01) continue;

          const avgH = (y00 + y10 + y11 + y01) * 0.25;
          const baseColor = getGroundColor(avgH);

          const slope1 = ((y10 - y00) + (y11 - y00)) * 0.5;
          const slope2 = ((y11 - y01) + (y11 - y10)) * 0.5;

          const fog = clamp(distSq / ((radius * tile) ** 2), 0, 1);
          const fogAmt1 = -fog * 90;
          const fogAmt2 = -fog * 100;

          const color1 = shadeColor(baseColor, 18 - slope1 * 10 + fogAmt1);
          const color2 = shadeColor(baseColor, 8 - slope2 * 10 + fogAmt2);

          addTriangle(tris, p00, p10, p11, color1);
          addTriangle(tris, p00, p11, p01, color2);

          // Árvores procedurais em billboard
          const seed = hash2(gx * 17, gz * 31);
          if (seed > 0.82 && distSq < (radius * tile * 0.92) ** 2) {
            const tx = centerX + (hash2(gx * 19, gz * 23) - 0.5) * 0.8;
            const tz = centerZ + (hash2(gx * 13, gz * 29) - 0.5) * 0.8;
            const ty = getHeight(tx, tz);
            addBillboardTree(tris, tx, ty, tz, distSq, seed);
          }
        }
      }

      tris.sort((a, b) => b.depth - a.depth);

      ensurePolygonPool(tris.length);

      for (let i = 0; i < polygons.length; i++) {
        const el = polygons[i];
        const tri = tris[i];

        if (!tri) {
          el.style.display = "none";
          continue;
        }

        drawTriangle(
          el,
          tri.p1,
          tri.p2,
          tri.p3,
          tri.color,
          100 + (tris.length - i),
          1
        );
      }

      coordsEl.textContent =
        `Pos: ${player.x.toFixed(1)}, ${player.y.toFixed(1)}, ${player.z.toFixed(1)}`;
      statsEl.textContent = `Polígonos: ${tris.length}`;
    }

    function update(dt) {
      const forwardX = Math.cos(player.yaw);
      const forwardZ = Math.sin(player.yaw);
      const rightX = -Math.sin(player.yaw);
      const rightZ = Math.cos(player.yaw);

      let moveX = 0;
      let moveZ = 0;

      if (keys["w"]) {
        moveX += forwardX;
        moveZ += forwardZ;
      }
      if (keys["s"]) {
        moveX -= forwardX;
        moveZ -= forwardZ;
      }
      if (keys["a"]) {
        moveX -= rightX;
        moveZ -= rightZ;
      }
      if (keys["d"]) {
        moveX += rightX;
        moveZ += rightZ;
      }

      const len = Math.hypot(moveX, moveZ);
      if (len > 0) {
        moveX /= len;
        moveZ /= len;
      }

      player.x += moveX * settings.moveSpeed * dt;
      player.z += moveZ * settings.moveSpeed * dt;

      const ground = getHeight(player.x, player.z) + 1.7;

      player.vy -= settings.gravity * dt;
      player.y += player.vy * dt;

      if (player.y <= ground) {
        player.y = ground;
        player.vy = 0;
        player.onGround = true;
      } else {
        player.onGround = false;
      }
    }

    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      keys[key] = true;

      if (e.code === "Space") {
        if (player.onGround) {
          player.vy = settings.jumpForce;
          player.onGround = false;
        }
        e.preventDefault();
      }
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    document.addEventListener("mousemove", (e) => {
      if (document.pointerLockElement !== game) return;

      player.yaw += e.movementX * settings.mouseSensitivity;
      player.pitch -= e.movementY * settings.mouseSensitivity;
      player.pitch = clamp(player.pitch, -settings.maxPitch, settings.maxPitch);
    });

    function lockPointer() {
      game.requestPointerLock();
    }

    startBtn.addEventListener("click", lockPointer);

    game.addEventListener("click", () => {
      if (document.pointerLockElement !== game) {
        lockPointer();
      }
    });

    document.addEventListener("pointerlockchange", () => {
      overlay.style.display = document.pointerLockElement === game ? "none" : "flex";
    });

    let last = performance.now();

    function frame(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;

      update(dt);
      render();
      requestAnimationFrame(frame);
    }

    render();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
